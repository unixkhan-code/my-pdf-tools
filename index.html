<!DOCTYPE html>
<html>
<head>
    <title>I Like PDF Converter</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: "Segoe UI", sans-serif; text-align: center; background: #f4f7f6; padding: 20px; }
        .nav { margin-bottom: 30px; }
        .box { border: 2px solid #2c3e50; padding: 30px; border-radius: 15px; max-width: 500px; margin: auto; background: white; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        button { background: #28a745; color: white; border: none; padding: 12px 20px; cursor: pointer; border-radius: 5px; font-size: 16px; margin: 5px; }
        button:hover { background: #218838; }
        input { padding: 10px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        
        /* Quick Guide Container Styling */
        .guide-box { border: 1px dashed #7f8c8d; padding: 20px; border-radius: 12px; max-width: 500px; margin: 20px auto 0 auto; background: #fdfefe; text-align: left; box-shadow: 0px 2px 5px rgba(0,0,0,0.05); }
        .guide-box h3 { margin-top: 0; color: #2c3e50; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .guide-box ul { margin: 0; padding-left: 20px; color: #555; font-size: 14px; }
        .guide-box li { margin-bottom: 8px; }
        .badge { background: #e74c3c; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        
        /* Informational page counter label formatting */
        .page-status { color: #2980b9; font-weight: bold; margin: 10px 0; font-size: 14px; }
    </style>
</head>
<body>

    <div id="main-navigation" class="nav">
        <h1>I Like PDF Converter</h1>
        <button onclick="showTool('merge')">Merge</button>
        <button onclick="showTool('split')">Split</button>
        <button onclick="showTool('compress')">Compress</button>
    </div>

    <div id="tool-container" class="box">
        <h2>Welcome</h2>
        <p>Select a tool to get started.</p>
    </div>

    <div id="guide-container" class="guide-box">
        <h3>💡 How to get started:</h3>
        <ul>
            <li>Select one of our free tools from the buttons above (**Merge**, **Split**, or **Compress**).</li>
            <li>All processing happens securely directly inside your browser—your files are never uploaded to a cloud server!</li>
        </ul>
    </div>

<script>
function showTool(tool) {
    const container = document.getElementById('tool-container');
    const guideContainer = document.getElementById('guide-container');
    
    if (tool === 'merge') {
        container.innerHTML = '<h2>Merge PDF & Images</h2><input type="file" id="mfiles" multiple accept="application/pdf, image/jpeg, image/png"><br><br><button onclick="processMerge()">Merge Documents</button>';
        
        guideContainer.innerHTML = `
            <h3>💡 Smart Merge Guide:</h3>
            <ul>
                <li><strong>One-Click Cross-Merging:</strong> You can select a mix of <span class="badge">.pdf</span>, <span class="badge">.jpg</span>, and <span class="badge">.png</span> files all at once.</li>
                <li>Hold down <code>Ctrl</code> (Windows) or <code>Cmd</code> (Mac) to select multiple files in the file upload window.</li>
                <li>The system automatically transforms your standalone image dimensions into native PDF sheets instantly.</li>
            </ul>`;
            
    } else if (tool === 'split') {
        // FIXED: The page count indicator, number input, and action buttons are loaded immediately upfront.
        container.innerHTML = `
            <h2>Split PDF</h2>
            <input type="file" id="sfile" accept="application/pdf" onchange="countPages()"><br>
            <div id="pageCount" class="page-status">Total Pages: 0 (Upload a file to scan)</div>
            <input type="number" id="pageNumber" placeholder="Page number to extract" min="1" style="width: 180px;"><br><br>
            <button id="splitBtn" onclick="processSplit()">Split PDF</button>`;
        
        guideContainer.innerHTML = `
            <h3>💡 PDF Split Guide:</h3>
            <ul>
                <li>Select a multi-page PDF document to analyze.</li>
                <li>The tool will instantly report the total page count available.</li>
                <li>Enter the exact page number you want to isolate and extract, then click split to save it as a brand-new file.</li>
            </ul>`;
            
    } else if (tool === 'compress') {
        container.innerHTML = '<h2>Compress PDF</h2><p style="font-size:12px; color:gray;">Note: This optimizes structures and metadata streams.</p><input type="file" id="cfile" accept="application/pdf"><br><br><button onclick="processCompress()">Compress PDF</button>';
        
        guideContainer.innerHTML = `
            <h3>💡 Optimization Guide:</h3>
            <ul>
                <li>Drop large or unoptimized PDF files here.</li>
                <li>The engine applies structural object stream reduction to strip out repetitive internal metadata layers.</li>
                <li>Reduces data sizing footprints significantly while keeping formatting fonts and visual tables completely safe.</li>
            </ul>`;
    }
}

// Merge Logic using File Extension Processing
async function processMerge() {
    const { PDFDocument } = PDFLib;
    const pdfDoc = await PDFDocument.create();
    const files = document.getElementById('mfiles').files;

    if (files.length === 0) return alert("Please select files first!");

    for (let file of files) {
        const arr = await file.arrayBuffer();
        const fileName = file.name.toLowerCase();

        try {
            if (fileName.endsWith('.pdf')) {
                const d = await PDFDocument.load(arr);
                const pages = await pdfDoc.copyPages(d, d.getPageIndices());
                pages.forEach(p => pdfDoc.addPage(p));
            } 
            else if (fileName.endsWith('.jpg') || fileName.endsWith('.jpeg')) {
                const jpgImage = await pdfDoc.embedJpg(arr);
                const page = pdfDoc.addPage([jpgImage.width, jpgImage.height]);
                page.drawImage(jpgImage, { x: 0, y: 0, width: jpgImage.width, height: jpgImage.height });
            } 
            else if (fileName.endsWith('.png')) {
                const pngImage = await pdfDoc.embedPng(arr);
                const page = pdfDoc.addPage([pngImage.width, pngImage.height]);
                page.drawImage(pngImage, { x: 0, y: 0, width: pngImage.width, height: pngImage.height });
            }
            else {
                alert(`Skipping unsupported format: ${file.name}`);
            }
        } catch (error) {
            console.error("Error processing file: " + file.name, error);
            alert(`Could not process file "${file.name}". The asset layout or compression formatting might be unreadable.`);
        }
    }

    const pdfBytes = await pdfDoc.save();
    downloadFile(pdfBytes, "Merged_Document.pdf");
}

// Scans file structure and dynamically changes the inner counter string text
async function countPages() {
    const { PDFDocument } = PDFLib;
    const fileInput = document.getElementById('sfile');
    
    if (fileInput.files.length === 0) return;
    
    try {
        const arr = await fileInput.files[0].arrayBuffer();
        const pdfDoc = await PDFDocument.load(arr);
        document.getElementById('pageCount').innerText = "Total Pages Available: " + pdfDoc.getPageCount();
    } catch (e) {
        alert("Could not read PDF structure. Ensure the file is not corrupted or password protected.");
    }
}

// Extracts single page targets dynamically
async function processSplit() {
    const { PDFDocument } = PDFLib;
    const fileInput = document.getElementById('sfile');
    
    if (fileInput.files.length === 0) return alert("Please select a PDF file first!");
    
    const arr = await fileInput.files[0].arrayBuffer();
    const pdfDoc = await PDFDocument.load(arr);
    const pageNum = parseInt(document.getElementById('pageNumber').value) - 1;
    
    if (isNaN(pageNum) || pageNum < 0 || pageNum >= pdfDoc.getPageCount()) {
        return alert(`Invalid selection! Please enter a valid page number between 1 and ${pdfDoc.getPageCount()}.`);
    }
    
    const newDoc = await PDFDocument.create();
    const [page] = await newDoc.copyPages(pdfDoc, [pageNum]);
    newDoc.addPage(page);
    
    const pdfBytes = await newDoc.save();
    downloadFile(pdfBytes, `Split_Page_${pageNum + 1}.pdf`);
}

// Compress function handler
async function processCompress() {
    const { PDFDocument } = PDFLib;
    const fileInput = document.getElementById('cfile');
    
    if (fileInput.files.length === 0) return alert("Please select a file first!");
    
    const arr = await fileInput.files[0].arrayBuffer();
    const pdfDoc = await PDFDocument.load(arr);
    
    const pdfBytes = await pdfDoc.save({ useObjectStreams: true });
    downloadFile(pdfBytes, "Compressed.pdf");
}

function downloadFile(bytes, name) {
    const blob = new Blob([bytes], { type: "application/pdf" });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = name;
    link.click();
}

// URL Parameter initialization tracking
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const tool = urlParams.get('tool');
    if (tool) {
        document.getElementById('main-navigation').style.display = 'none';
        showTool(tool);
    }
};
</script>
</body>
</html>
