<!DOCTYPE html>
<html>
<head>
    <title>I Like PDF Converter</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f6; padding: 20px; }
        .nav { margin-bottom: 20px; }
        .box { border: 2px solid #2c3e50; padding: 25px; border-radius: 12px; max-width: 500px; margin: auto; background: white; }
        button { background: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="nav">
        <button onclick="showTool('merge')">Merge PDF</button>
        <button onclick="showTool('split')">Split PDF</button>
    </div>

    <div id="tool-container" class="box">
        <h2>Welcome to I Like PDF Converter</h2>
        <p>Select a tool from the top menu.</p>
    </div>

    <script>
        function showTool(tool) {
            const container = document.getElementById('tool-container');
            if (tool === 'merge') {
                container.innerHTML = '<h2>Merge PDF</h2><input type="file" id="m1" multiple><br><br><button onclick="processMerge()">Merge</button>';
            } else if (tool === 'split') {
                container.innerHTML = '<h2>Split PDF</h2><input type="file" id="s1"><br><br><button onclick="processSplit()">Split (First Page)</button>';
            }
        }

        async function processMerge() {
            const { PDFDocument } = PDFLib;
            const pdfDoc = await PDFDocument.create();
            const files = document.getElementById('m1').files;
            for (let file of files) {
                const arr = await file.arrayBuffer();
                const d = await PDFDocument.load(arr);
                const pages = await pdfDoc.copyPages(d, d.getPageIndices());
                pages.forEach(p => pdfDoc.addPage(p));
            }
            const bytes = await pdfDoc.save();
            const blob = new Blob([bytes], {type: 'application/pdf'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'Merged.pdf';
            link.click();
        }

        async function processSplit() {
            const { PDFDocument } = PDFLib;
            const file = document.getElementById('s1').files[0];
            const arr = await file.arrayBuffer();
            const pdfDoc = await PDFDocument.load(arr);
            const newDoc = await PDFDocument.create();
            const [page] = await newDoc.copyPages(pdfDoc, [0]);
            newDoc.addPage(page);
            const bytes = await newDoc.save();
            const blob = new Blob([bytes], {type: 'application/pdf'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'Split_Page_1.pdf';
            link.click();
        }
    </script>
</body>
</html>
