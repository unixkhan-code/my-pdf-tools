<h1>Mera PDF Converter Ready Hai!</h1>
<!DOCTYPE html>
<html>
<head>
    <title>Merge PDF Tool</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; text-align: center; }
        .box { border: 2px solid #333; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Merge PDF Tool</h2>
        <input type="file" id="pdf1" accept="application/pdf"><br><br>
        <input type="file" id="pdf2" accept="application/pdf"><br><br>
        <button onclick="mergePDFs()">Merge & Download</button>
    </div>

    <script>
        async function mergePDFs() {
            const { PDFDocument } = PDFLib;
            const pdfDoc = await PDFDocument.create();
            const files = [document.getElementById('pdf1').files[0], document.getElementById('pdf2').files[0]];
            
            for (let file of files) {
                if(!file) continue;
                const arrayBuffer = await file.arrayBuffer();
                const donorPdfDoc = await PDFDocument.load(arrayBuffer);
                const copiedPages = await pdfDoc.copyPages(donorPdfDoc, donorPdfDoc.getPageIndices());
                copiedPages.forEach((page) => pdfDoc.addPage(page));
            }
            
            const mergedPdfBytes = await pdfDoc.save();
            const blob = new Blob([mergedPdfBytes], {type: 'application/pdf'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'Merged.pdf';
            link.click();
        }
    </script>
</body>
</html>
